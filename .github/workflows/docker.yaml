name: Docker build

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths-ignore:
      - "docker/Dockerfile.mediamtx"
      - "docker/mediamtx.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-amd64:
    name: Build Docker (amd64)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get build tags
        id: build-tag
        run: ./ci_env.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            livepeerframeworks/go-livepeer
            ghcr.io/livepeer-frameworks/go-livepeer
          tags: |
            type=sha
            type=ref,event=pr
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            suffix=-amd64

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          build-args: |
            BUILD_TAGS=${{ steps.build-tag.outputs.build-tags }}
          context: .
          platforms: linux/amd64
          push: true
          file: "docker/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-amd64
          cache-to: type=gha,scope=docker-amd64,mode=max,ignore-error=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.meta.outputs.tags }}" | head -1 > /tmp/digests/amd64-tag.txt

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-amd64
          path: /tmp/digests/

  build-arm64:
    name: Build Docker (arm64)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get build tags
        id: build-tag
        run: ./ci_env.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            livepeerframeworks/go-livepeer
            ghcr.io/livepeer-frameworks/go-livepeer
          tags: |
            type=sha
            type=ref,event=pr
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          flavor: |
            suffix=-arm64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          build-args: |
            BUILD_TAGS=${{ steps.build-tag.outputs.build-tags }}
          context: .
          platforms: linux/arm64
          push: true
          file: "docker/Dockerfile"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-arm64
          cache-to: type=gha,scope=docker-arm64,mode=max,ignore-error=true

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-arm64
          path: /dev/null

  merge-manifest:
    name: Merge multi-arch manifest
    if: github.event_name == 'push'
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            livepeerframeworks/go-livepeer
            ghcr.io/livepeer-frameworks/go-livepeer
          tags: |
            type=sha
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifests
        run: |
          # For each tag, create a manifest combining amd64 and arm64
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for $tag"
            docker buildx imagetools create -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64" || echo "Warning: failed to create manifest for $tag"
          done

      - name: Write docker digest for monorepo consumption
        run: |
          # Get the digest of the latest tag for manifest consumption
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker buildx imagetools inspect "$TAG" --format '{{.Manifest.Digest}}' > docker-digest.txt
          echo "Digest: $(cat docker-digest.txt)"

      - name: Upload docker digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest
          path: docker-digest.txt
